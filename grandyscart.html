<!DOCTYPE html>
<html>
<head>

<title>Grandys Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#ffffff;
font-family:'Poppins',sans-serif;
color:#111;
}

header{
background:#000;
text-align:center;
padding:40px;
}

header h1{
font-family:'Playfair Display',serif;
font-size:52px;
margin:0;
color:#FFD84D;
letter-spacing:3px;
}

.tagline{
color:white;
margin-top:10px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
padding:60px;
max-width:1200px;
margin:auto;
}

.product{
border-radius:10px;
height:250px;
display:flex;
align-items:center;
justify-content:center;
background:#fff4b5;
cursor:pointer;
transition:0.3s;
font-size:18px;
}

.product:hover{
transform:scale(1.05);
box-shadow:0 10px 30px rgba(255,210,0,0.4);
}

footer{
background:black;
color:#FFD84D;
text-align:center;
padding:25px;
}

</style>

<script>
function openInsta(){
window.open("https://www.instagram.com/grandys_cart/","_blank");
}
</script>

</head>

<body>

<header>
<h1>Grandys Cart</h1>
<p class="tagline">Feel the Grandness in Grandys</p>
</header>

<div class="products">

<div class="product" onclick="openInsta()">Product Coming Soon</div>
<div class="product" onclick="openInsta()">Product Coming Soon</div>
<div class="product" onclick="openInsta()">Product Coming Soon</div>
<div class="product" onclick="openInsta()">Product Coming Soon</div>

</div>

<footer>
© 2026 Grandys Cart
</footer>

</body>
</html>
